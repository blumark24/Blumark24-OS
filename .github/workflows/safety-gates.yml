name: Safety Gates

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  safety-gates:
    name: lint • build • verify:isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify tenant isolation (static checks)
        run: npm run verify:isolation
