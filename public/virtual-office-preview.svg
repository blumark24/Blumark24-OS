      <stop offset="0.45" stop-color="#0A2340"/>
      <stop offset="1" stop-color="#050816"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#3B82F6"/>
